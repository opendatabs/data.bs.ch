name: Refresh LLM dataset docs

on:
  schedule:
    - cron: "30 2 * * *"
  workflow_dispatch:

jobs:
  refresh:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup uv
        uses: astral-sh/setup-uv@v5
        with:
          version: "0.6.4"

      - name: Sync dependencies
        run: uv sync --frozen

      - name: Generate dataset docs
        run: uv run python scripts/generate_dataset_docs.py

      - name: Generate llms ctx artifacts
        run: uv run python scripts/generate_llms_ctx.py

      - name: Create pull request
        uses: peter-evans/create-pull-request@v7
        with:
          branch: ci/refresh-llms-datasets
          commit-message: "chore: refresh generated llms dataset indexes"
          title: "chore: refresh generated llms dataset indexes"
          body: |
            Automated refresh of generated dataset indexes:
            - `llms/datasets/index.md`
            - `llms/datasets/by-theme/*.md`
            - `llms/datasets/full/*.md`
            - `llms-ctx.txt`
            - `llms-ctx-full.txt`
          labels: |
            documentation
            automation
          delete-branch: true
